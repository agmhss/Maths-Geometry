<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>வடிவியல் உலகம் 2.0 - AGMHSS</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #e67e22;
            --success: #27ae60;
            --bg: #ecf0f1;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            background: var(--bg);
        }

        .header {
            background: var(--primary);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .nav {
            display: flex;
            justify-content: center;
            background: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav button {
            padding: 15px 25px;
            border: none;
            background: none;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .nav button.active {
            color: var(--accent);
            border-bottom: 3px solid var(--accent);
        }

        .section {
            max-width: 900px;
            margin: 30px auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            display: none;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .section.active { display: block; }

        /* Quiz Styles */
        .quiz-option {
            display: block;
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #f8f9fa;
            border: 1px solid #ddd;
            border-radius: 8px;
            cursor: pointer;
            text-align: left;
            font-size: 1.1em;
        }

        .quiz-option:hover { background: #e9ecef; }

        /* Shape Identification */
        .shape-box {
            width: 150px;
            height: 150px;
            margin: 20px auto;
            border: 2px solid #333;
        }

        .circle { border-radius: 50%; background: #3498db; }
        .rect { width: 200px; height: 100px; background: #9b59b6; }
        .tri { 
            width: 0; height: 0; 
            border-left: 75px solid transparent;
            border-right: 75px solid transparent;
            border-bottom: 130px solid #e74c3c;
            border-top: none;
            background: none !important;
        }

        .btn {
            padding: 10px 25px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-next { background: var(--accent); color: white; margin-top: 20px; }
    </style>
</head>
<body>
<a href="challenge.html" style="text-decoration: none;">
    <button style="padding: 15px 30px; background: #e67e22; color: white; border: none; border-radius: 10px; cursor: pointer; font-size: 1.2em; font-weight: bold;">
        சவால் பகுதிக்குச் செல் 🚀
    </button>
</a>

    <a href="geometry.html" style="text-decoration: none;">
    <button style="padding: 15px 30px; background: #e67e22; color: white; border: none; border-radius: 10px; cursor: pointer; font-size: 1.2em; font-weight: bold;">
        வடிவியல் பகுதிக்குச் செல் 🚀
    </button>
    </a>
    
<div class="header">
    <h1>வடிவியல் மேடை (Geometry Arena) 🏆</h1>
    <p>AGMHSS Patteeswaram - மாணவர்களின் அறிவுத் திறன் தளம்</p>
</div>

<div class="nav">
    <button class="active" onclick="showSection('identify')">வடிவத்தைக் கண்டுபிடி</button>
    <button onclick="showSection('quiz')">வினாடி வினா</button>
    <button onclick="showSection('formulas')">சூத்திரங்கள்</button>
</div>

<div id="identify" class="section active">
    <h2>இவன் யார்?</h2>
    <p>கீழே கொடுக்கப்பட்டுள்ள வடிவத்தின் சரியான பெயரைத் தேர்ந்தெடு.</p>
    <div id="shape-target" class="shape-box circle"></div>
    <div id="id-options">
        <button class="quiz-option" onclick="checkIdentity('Circle')">வட்டம்</button>
        <button class="quiz-option" onclick="checkIdentity('Square')">சதுரம்</button>
        <button class="quiz-option" onclick="checkIdentity('Triangle')">முக்கோணம்</button>
    </div>
    <p id="id-feedback" style="font-weight:bold; margin-top:20px;"></p>
    <button class="btn btn-next" onclick="nextIdentity()">அடுத்த வடிவம்</button>
</div>

<div id="quiz" class="section">
    <h2>வினாடி வினா (Quiz Time)</h2>
    <div id="quiz-content">
        <p id="quiz-question" style="font-size:1.2em; font-weight:bold;"></p>
        <div id="quiz-options"></div>
    </div>
    <p id="quiz-feedback" style="font-weight:bold; margin-top:20px;"></p>
</div>

<div id="formulas" class="section">
    <h2>முக்கிய சூத்திரங்கள்</h2>
    <table style="width:100%; border-collapse: collapse;">
        <tr style="background:#eee;">
            <th style="padding:10px; border:1px solid #ddd;">வடிவம்</th>
            <th style="padding:10px; border:1px solid #ddd;">சுற்றளவு</th>
            <th style="padding:10px; border:1px solid #ddd;">பரப்பளவு</th>
        </tr>
        <tr>
            <td style="padding:10px; border:1px solid #ddd;">சதுரம்</td>
            <td style="padding:10px; border:1px solid #ddd;">4a</td>
            <td style="padding:10px; border:1px solid #ddd;">a²</td>
        </tr>
        <tr>
            <td style="padding:10px; border:1px solid #ddd;">செவ்வகம்</td>
            <td style="padding:10px; border:1px solid #ddd;">2(l+w)</td>
            <td style="padding:10px; border:1px solid #ddd;">l × w</td>
        </tr>
        <tr>
            <td style="padding:10px; border:1px solid #ddd;">வட்டம்</td>
            <td style="padding:10px; border:1px solid #ddd;">2πr</td>
            <td style="padding:10px; border:1px solid #ddd;">πr²</td>
        </tr>
    </table>
</div>

<script>
    function showSection(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.target.classList.add('active');
        if(id === 'quiz') startQuiz();
    }

    // Shape Identification Logic
    let currentIdShape = 'Circle';
    function nextIdentity() {
        const shapes = ['Circle', 'Rectangle', 'Triangle'];
        currentIdShape = shapes[Math.floor(Math.random() * shapes.length)];
        const target = document.getElementById('shape-target');
        target.className = 'shape-box';
        document.getElementById('id-feedback').textContent = "";
        
        if(currentIdShape === 'Circle') target.classList.add('circle');
        else if(currentIdShape === 'Rectangle') target.classList.add('rect');
        else target.classList.add('tri');
    }

    function checkIdentity(choice) {
        const fb = document.getElementById('id-feedback');
        if(choice === currentIdShape) {
            fb.textContent = "சரி! 🎉 இது " + (choice === 'Circle' ? 'வட்டம்' : choice === 'Rectangle' ? 'செவ்வகம்' : 'முக்கோணம்');
            fb.style.color = "green";
        } else {
            fb.textContent = "தவறு, மீண்டும் முயற்சி செய்! ❌";
            fb.style.color = "red";
        }
    }

    // Quiz Logic
    const quizData = [
        { q: "செங்கோணத்தின் அளவு என்ன?", a: ["45°", "90°", "180°"], c: 1 },
        { q: "முக்கோணத்தின் மூன்று கோணங்களின் கூடுதல்?", a: ["90°", "180°", "360°"], c: 1 },
        { q: "வட்டத்தின் சுற்றளவு காணும் சூத்திரம்?", a: ["πr²", "2πr", "4a"], c: 1 },
        { q: "நான்கு பக்கங்களும் சமமாக உள்ள வடிவம்?", a: ["செவ்வகம்", "சதுரம்", "வட்டம்"], c: 1 }
    ];

    let currentQ = 0;
    function startQuiz() {
        const q = quizData[currentQ];
        document.getElementById('quiz-question').textContent = q.q;
        const optionsBox = document.getElementById('quiz-options');
        optionsBox.innerHTML = "";
        q.a.forEach((opt, index) => {
            const btn = document.createElement('button');
            btn.className = 'quiz-option';
            btn.textContent = opt;
            btn.onclick = () => checkQuiz(index);
            optionsBox.appendChild(btn);
        });
        document.getElementById('quiz-feedback').textContent = "";
    }

    function checkQuiz(index) {
        const fb = document.getElementById('quiz-feedback');
        if(index === quizData[currentQ].c) {
            fb.textContent = "சரியான விடை! 🌟";
            fb.style.color = "green";
            setTimeout(() => {
                currentQ = (currentQ + 1) % quizData.length;
                startQuiz();
            }, 1500);
        } else {
            fb.textContent = "தவறு, சரியான விடை: " + quizData[currentQ].a[quizData[currentQ].c];
            fb.style.color = "red";
        }
    }
</script>

</body>
</html>
